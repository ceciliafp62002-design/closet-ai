<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA básico -->
    <meta name="theme-color" content="#08080A" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS PWA — esto es LO MÁS IMPORTANTE para iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ClosetAI" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Splash screens iPhone 16 Pro (y otros tamaños comunes) -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-1179x2556.png" />
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-1290x2796.png" />
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-1170x2532.png" />

    <!-- SEO / descripción -->
    <meta name="description" content="Tu armario digital inteligente con IA. Escanea, organiza y combina tu ropa." />
    <title>ClosetAI</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
